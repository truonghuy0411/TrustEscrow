<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustEscrow | Decentralized Milestone Protocol</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --border-color: #334155;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button.outline {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        button.outline:hover {
            background-color: rgba(56, 189, 248, 0.1);
        }

        main {
            width: 100%;
            max-width: 800px;
            display: grid;
            gap: 20px;
        }

        .panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .wallet-address {
            color: var(--accent-color);
            font-family: monospace;
            background-color: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .result-area {
            margin-top: 10px;
            padding: 16px;
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success-color);
            border-radius: 8px;
            color: var(--success-color);
            font-family: monospace;
            word-break: break-all;
            display: none;
        }

        .result-area.active {
            display: block;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Trust<span>Escrow</span></div>
        <button id="connectWalletBtn" class="outline">Connect Wallet</button>
    </header>

    <main>
        <div class="panel status-panel">
            <div><strong>Network:</strong> Stellar Testnet</div>
            <div><strong>Active Wallet:</strong> <span id="walletAddressDisplay" class="wallet-address">Not
                    Connected</span></div>
        </div>

        <div class="panel">
            <h2>1. Initialize & Lock Funds</h2>
            <div class="input-group">
                <label for="freelancerAddress">Freelancer Stellar Address</label>
                <input type="text" id="freelancerAddress" placeholder="e.g. GABCDEFGHIJKLMNOPQRSTUVWXYZ..."
                    autocomplete="off">
            </div>
            <div class="input-group">
                <label for="projectAmount">Total Amount (XLM)</label>
                <input type="number" id="projectAmount" placeholder="100" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="deadlineSeconds">Project Duration (Seconds)</label>
                <input type="number" id="deadlineSeconds" placeholder="604800 (1 week)" autocomplete="off">
            </div>
            <button id="createProjectBtn">Lock Funds in Escrow</button>
        </div>

        <div class="panel">
            <h2>2. Release Milestone</h2>
            <div class="input-group">
                <label for="projectId">Project ID</label>
                <input type="number" id="projectId" placeholder="e.g. 1" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="releaseAmount">Amount to Release (XLM)</label>
                <input type="number" id="releaseAmount" placeholder="30" autocomplete="off">
            </div>
            <button id="releaseFundsBtn">Approve & Release Funds</button>
        </div>

        <div id="txHashResult" class="result-area"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const connectWalletBtn = document.getElementById('connectWalletBtn');
            const walletAddressDisplay = document.getElementById('walletAddressDisplay');
            const createProjectBtn = document.getElementById('createProjectBtn');
            const releaseFundsBtn = document.getElementById('releaseFundsBtn');
            const txHashResult = document.getElementById('txHashResult');

            let isWalletConnected = false;

            connectWalletBtn.addEventListener('click', () => {
                isWalletConnected = true;
                walletAddressDisplay.textContent = 'GCMAF3RH7Y6OXKMSRMJ7SZTRKNALCXRF666CPOPI3ARM3ANUJBYLRBC3';
                connectWalletBtn.textContent = 'Connected';
                connectWalletBtn.style.backgroundColor = 'rgba(56, 189, 248, 0.2)';
                connectWalletBtn.style.border = '1px solid transparent';
            });

            const simulateTransaction = (actionName) => {
                if (!isWalletConnected) {
                    alert('Please connect your wallet first to authorize transactions.');
                    return;
                }

                txHashResult.classList.remove('active');
                txHashResult.style.color = 'var(--text-main)';
                txHashResult.style.borderColor = 'var(--border-color)';
                txHashResult.style.backgroundColor = 'var(--card-bg)';
                txHashResult.textContent = 'Signing transaction... Please approve in your wallet.';
                txHashResult.classList.add('active');

                setTimeout(() => {
                    txHashResult.style.color = 'var(--success-color)';
                    txHashResult.style.borderColor = 'var(--success-color)';
                    txHashResult.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                    txHashResult.innerHTML = `<strong>${actionName} Successful!</strong><br>Transaction Hash: c1f08d4cb69d8f5b73f9df96c6b8894f0f2f188ddbaed6e01a435af1e7502ffc`;
                }, 2000);
            };

            createProjectBtn.addEventListener('click', () => {
                const freelancerAddress = document.getElementById('freelancerAddress').value;
                const amount = document.getElementById('projectAmount').value;

                if (!freelancerAddress || !amount) {
                    alert('Please fill in all required fields.');
                    return;
                }
                simulateTransaction('Funds Locked');
            });

            releaseFundsBtn.addEventListener('click', () => {
                const projectId = document.getElementById('projectId').value;
                const amount = document.getElementById('releaseAmount').value;

                if (!projectId || !amount) {
                    alert('Please provide Project ID and Amount.');
                    return;
                }
                simulateTransaction('Milestone Released');
            });
        });
    </script>
</body>

</html>
